name: Release

# Tag a release (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to build the
# macOS binaries, cut the GitHub release, and update the Homebrew tap.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    # darwin/amd64 + darwin/arm64 cross-compile with CGO disabled, so ubuntu is
    # fine and faster than a macOS runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on astaub/homebrew-tap (repo secret).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
