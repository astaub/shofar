name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    # shofar is a macOS tool — validate on the target platform.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
