version: 2
project_name: shofar

before:
  hooks:
    - go mod tidy

builds:
  - id: shofar
    main: .
    binary: shofar
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: astaub
    name: shofar

# Homebrew tap publishing. goreleaser writes a Cask (the modern way to ship a
# pre-compiled binary) into astaub/homebrew-tap. The HOMEBREW_TAP_TOKEN env var
# (a token with write access to the tap) must be set when running
# `goreleaser release --clean`. Releases are cut locally so the token never
# lives in GitHub. Install stays: `brew install astaub/tap/shofar`.
# See CONTRIBUTING.md → Releasing.
homebrew_casks:
  - name: shofar
    repository:
      owner: astaub
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/astaub/shofar"
    description: "macOS RAM guard for dev-worktree workflows"
    # Unsigned binary: strip the Gatekeeper quarantine xattr on install so the
    # cask runs without a security prompt.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/shofar"]
          end
