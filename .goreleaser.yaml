version: 2
project_name: shofar

before:
  hooks:
    - go mod tidy

builds:
  - id: shofar
    main: .
    binary: shofar
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: astaub
    name: shofar

# Homebrew tap publishing. The tap repo astaub/homebrew-tap must exist, and a
# HOMEBREW_TAP_TOKEN (a PAT with `contents:write` on the tap) must be exported in
# the shell when running `goreleaser release --clean`. Releases are cut locally
# (no CI release workflow) so this token never lives in GitHub. After a release:
# `brew install astaub/tap/shofar`. See CONTRIBUTING.md → Releasing.
brews:
  - name: shofar
    repository:
      owner: astaub
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/astaub/shofar"
    description: "macOS RAM guard for dev-worktree workflows"
    license: "MIT"
    install: |
      bin.install "shofar"
